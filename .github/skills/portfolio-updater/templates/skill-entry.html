<!-- SKILL TIMELINE ENTRY TEMPLATE -->
<!-- Location: index.html, inside the .timeline-centered div (Knowledge section) -->
<!-- How to use: Copy this template, replace the placeholder values, paste before the <article class="timeline-entry begin"> line -->

<article class="timeline-entry animate-box" data-animate-effect="fadeInLeft">
    <div class="timeline-entry-inner">
        <div class="timeline-icon color-X">
            <!-- Replace color-X with: color-1, color-2, color-3, etc. (max 7) -->
            <i class="fa fa-check"></i>
        </div>
        <div class="timeline-label">
            <h2>SKILL_CATEGORY_NAME</h2>
            <!-- Example: "Full Stack Developer", "DevOps Engineer", "Data Science" -->
            <p>
                SKILL_1,
                SKILL_2,
                SKILL_3,
                SKILL_4
            </p>
            <!-- Comma-separated list of skills in this category -->
        </div>
    </div>
</article>
